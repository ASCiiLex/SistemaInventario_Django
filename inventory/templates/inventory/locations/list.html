{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <!-- HEADER + ACTIONS -->
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h1 class="mb-0">Almacenes</h1>

        {% if perm.create_inventory %}
            <a href="{% url 'location_create' %}" class="btn btn-success">
                Nuevo almacén
            </a>
        {% endif %}
    </div>

    <!-- FILTROS -->
    <form 
        method="get"
        hx-get="{% url 'location_list' %}"
        hx-target="#locations-table"
        hx-push-url="true"
        class="row g-2 mb-3"
    >
        <div class="col-12 col-md-4">
            <input 
                type="text" 
                name="q" 
                value="{{ search }}"
                class="form-control"
                placeholder="Buscar almacén..."
            >
        </div>

        <div class="col-auto">
            <button type="submit" class="btn btn-outline-secondary">
                Filtrar
            </button>
        </div>

        <div class="col-auto">
            <a href="{% url 'location_list' %}" class="btn btn-outline-secondary">
                Limpiar
            </a>
        </div>
    </form>

    <!-- TABLE -->
    <div id="locations-table">
        {% include "inventory/locations/partials/table.html" %}
    </div>

</div>
{% endblock %}

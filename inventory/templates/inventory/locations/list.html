{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="mb-0">Almacenes</h1>

        {% if perm.create_inventory %}
            <a href="{% url 'location_create' %}" class="btn btn-success">
                Nuevo almacén
            </a>
        {% endif %}
    </div>

    <form 
        method="get"
        hx-get="{% url 'location_list' %}"
        hx-target="#locations-table"
        hx-push-url="true"
        hx-trigger="keyup changed delay:400ms from:input[name='q']"
        class="mb-3"
    >
        <input 
            type="text" 
            name="q" 
            value="{{ search }}"
            class="form-control"
            placeholder="Buscar almacén..."
        >
    </form>

    <div id="locations-table">
        {% include "inventory/locations/partials/table.html" %}
    </div>

</div>
{% endblock %}

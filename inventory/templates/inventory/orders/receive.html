{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-3">Recepción pedido #{{ order.id }}</h2>

    <form method="post" class="card card-body">
        {% csrf_token %}

        <table class="table">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Pendiente</th>
                    <th>Recibir ahora</th>
                </tr>
            </thead>
            <tbody>
                {% for item in order.items.all %}
                <tr>
                    <td>{{ item.product }}</td>
                    <td>{{ item.quantity }}</td>
                    <td>
                        <input type="number"
                               name="qty_{{ item.id }}"
                               min="0"
                               max="{{ item.quantity }}"
                               class="form-control">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="d-flex gap-2">
            <button class="btn btn-success">Confirmar recepción</button>
            <a href="{% url 'order_detail' order.id %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

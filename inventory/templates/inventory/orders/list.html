{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Pedidos</h1>
        <a href="{% url 'order_create' %}" class="btn btn-success">Nuevo pedido</a>
    </div>

    <!-- 🔥 FILTERS -->
    <form
        method="get"
        class="row g-2 mb-3"
        hx-get="{% url 'order_list' %}"
        hx-target="#orders-table"
        hx-swap="innerHTML"
        hx-push-url="true"
        hx-trigger="change delay:300ms"
    >
        <div class="col-md-3">
            {{ filter_form.supplier }}
        </div>

        <div class="col-md-3">
            {{ filter_form.location }}
        </div>

        <div class="col-md-3">
            {{ filter_form.status }}
        </div>

        <!-- 🧹 RESET -->
        <div class="col-md-3 d-grid">
            <button type="button"
                    class="btn btn-outline-secondary"
                    onclick="resetFilters(this.form)">
                Limpiar
            </button>
        </div>
    </form>

    <!-- 🔥 TABLE CONTAINER (STANDARD) -->
    <div id="orders-table"
         hx-get="{% url 'order_list' %}"
         hx-trigger="load, inventory:orders_updated from:body"
         hx-target="this"
         hx-swap="innerHTML">

        {% include "inventory/orders/partials/table.html" %}

    </div>

</div>
{% endblock %}

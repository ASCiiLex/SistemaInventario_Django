{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Pedidos</h1>
        <a href="{% url 'order_create' %}" class="btn btn-success">Nuevo pedido</a>
    </div>

    <form
        method="get"
        class="row g-2 mb-3"
        hx-get="{% url 'order_list' %}"
        hx-target="#orders-table"
        hx-push-url="true"
        hx-include="this"
    >
        <div class="col-md-3">
            {{ filter_form.supplier }}
        </div>
        <div class="col-md-3">
            {{ filter_form.location }}
        </div>
        <div class="col-md-3">
            {{ filter_form.status }}
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-outline-primary w-100">Filtrar</button>
        </div>
    </form>

    <div id="orders-table"
         hx-get="{% url 'order_list' %}"
         hx-trigger="inventory:refresh from:body"
         hx-target="this"
         hx-swap="outerHTML">
        {% include "inventory/orders/partials/table.html" %}
    </div>
</div>
{% endblock %}

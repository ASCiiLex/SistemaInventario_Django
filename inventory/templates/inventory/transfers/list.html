{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Transferencias</h2>
        <a href="{% url 'transfer_create' %}" class="btn btn-success">Nueva transferencia</a>
    </div>

    <form
        method="get"
        class="row g-2 mb-3"
        hx-get="{% url 'transfer_list' %}"
        hx-target="#transfers-table"
        hx-push-url="true"
        hx-include="this"
    >
        <div class="col-md-3">
            {{ filter_form.product }}
        </div>
        <div class="col-md-3">
            {{ filter_form.origin }}
        </div>
        <div class="col-md-3">
            {{ filter_form.destination }}
        </div>
        <div class="col-md-2">
            {{ filter_form.status }}
        </div>
        <div class="col-md-1 d-flex align-items-end">
            <button type="submit" class="btn btn-outline-primary w-100">Filtrar</button>
        </div>
    </form>

    <div id="transfers-table"
         hx-get="{% url 'transfer_list' %}"
         hx-trigger="inventory:movement from:body"
         hx-target="this"
         hx-swap="outerHTML">
        {% include "inventory/transfers/partials/table.html" %}
    </div>
</div>
{% endblock %}

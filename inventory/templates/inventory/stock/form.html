{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>{{ title }}</h1>

    <form method="post" class="mt-3 card card-body" onsubmit="return handleSubmit(this)">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="d-flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary" data-loading-text="Guardando...">
                Guardar
            </button>
            <a href="{% url 'stockmovement_list' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Previsualización del archivo</h2>

<div class="card shadow-sm mb-4">
    <div class="card-body p-0">
        <table class="table table-striped table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    {% for col in rows.0.keys %}
                        <th>{{ col }}</th>
                    {% endfor %}
                </tr>
            </thead>

            <tbody>
                {% for row in rows %}
                <tr>
                    {% for value in row.values %}
                        <td>{{ value }}</td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<form method="post" action="{% url 'import_stock_confirm' %}">
    {% csrf_token %}
    <button class="btn btn-success">Confirmar importación</button>
    <a href="{% url 'import_stock' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}

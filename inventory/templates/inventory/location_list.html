<!-- inventory/templates/inventory/location_list.html -->
{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>Almacenes</h1>
    <table class="table table-striped mt-3">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Dirección</th>
                <th>Activo</th>
            </tr>
        </thead>
        <tbody>
            {% for location in locations %}
                <tr>
                    <td>{{ location.name }}</td>
                    <td>{{ location.address|default:"-" }}</td>
                    <td>{{ location.is_active|yesno:"Sí,No" }}</td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="3" class="text-center">No hay almacenes definidos.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-3">Auditoría</h2>

    <form
        method="get"
        class="row g-2 mb-3 align-items-end"
        hx-get="{% url 'audit_list' %}"
        hx-target="#audit-table"
        hx-swap="innerHTML"
        hx-push-url="true"
        hx-trigger="change delay:300ms"
    >

        <!-- DESDE -->
        <div class="col-md-2">
            <div class="small text-muted mb-1">Desde</div>
            <input type="date"
                name="date_from"
                value="{{ request.GET.date_from }}"
                class="form-control form-control-sm">
        </div>

        <!-- HASTA -->
        <div class="col-md-2">
            <div class="small text-muted mb-1">Hasta</div>
            <input type="date"
                name="date_to"
                value="{{ request.GET.date_to }}"
                class="form-control form-control-sm">
        </div>

        <!-- USUARIO -->
        <div class="col-md-2">
            <div class="small text-muted mb-1">Usuario</div>
            <input type="text"
                name="user"
                value="{{ request.GET.user }}"
                class="form-control form-control-sm"
                placeholder="Usuario">
        </div>

        <!-- ACCIÓN -->
        <div class="col-md-2">
            <div class="small text-muted mb-1">Acción</div>
            <select name="action" class="form-select form-select-sm">
                <option value="">Todas</option>
                <option value="CREATE">Create</option>
                <option value="UPDATE">Update</option>
                <option value="DELETE">Delete</option>
                <option value="STATUS_CHANGE">Status</option>
                <option value="IMPORT">Import</option>
            </select>
        </div>

        <!-- MODELO -->
        <div class="col-md-2">
            <div class="small text-muted mb-1">Modelo</div>
            <input type="text"
                name="model"
                value="{{ request.GET.model }}"
                class="form-control form-control-sm"
                placeholder="Modelo">
        </div>

        <!-- LIMPIAR -->
        <div class="col-md-2 d-grid">
            <button type="button"
                    class="btn btn-outline-secondary btn-sm"
                    onclick="clearFilters(this)">
                Limpiar
            </button>
        </div>

    </form>

    <div id="audit-table">
        {% include "inventory/audit/partials/table.html" %}
    </div>
</div>
{% endblock %}

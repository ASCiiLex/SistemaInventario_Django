{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    {% if perm.can_view_system_metrics %}
    <div class="row mt-3">

        <div class="col-12">
            <div class="card card-section">
                <div class="card-header bg-dark text-white">
                    <span>Métricas del Sistema</span>
                </div>

                <div class="card-body">

                    {% include "dashboard/partials/system_metrics.html" %}

                </div>
            </div>
        </div>

        <div class="col-12 mt-3">
            <div class="card card-section">

                <div class="card-header bg-secondary text-white">
                    <span>Observabilidad Avanzada</span>
                </div>

                <div class="card-body text-center">

                    <p class="mb-3 text-muted">
                        Análisis detallado de rendimiento, trazas y cuellos de botella
                    </p>

                    <a href="{% url 'observability_slow_requests' %}" class="btn btn-outline-dark">
                        🔎 Ver trazas detalladas
                    </a>

                </div>

            </div>
        </div>

    </div>
    {% endif %}

</div>

{% endblock %}

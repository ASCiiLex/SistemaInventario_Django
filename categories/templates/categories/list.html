{% extends 'base.html' %}

{% block content %}
<h2 class="mb-3">Categorías</h2>

<form method="GET" class="mb-3 d-flex" style="gap: 10px;">
    <input type="text" name="q" value="{{ search }}" class="form-control" placeholder="Buscar categoría...">
    <button class="btn btn-primary">Buscar</button>
</form>

{% if perm.manage_categories %}
<a href="{% url 'category_create' %}" class="btn btn-success mb-3">Nueva Categoría</a>
{% endif %}

<div class="table-responsive">
<table class="table table-striped align-middle">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Padre</th>
            <th></th>
        </tr>
    </thead>

    <tbody>
        {% for c in categories %}

        <tr
            hx-get="{% url 'category_products' c.id %}"
            hx-target="#expand-{{ c.id }}"
            hx-swap="innerHTML"
            hx-trigger="click"
            hx-on::before-request="
                if (document.getElementById('expand-{{ c.id }}').innerHTML.trim() !== '') {
                    document.getElementById('expand-{{ c.id }}').innerHTML = '';
                    event.preventDefault();
                }
            "
            style="cursor:pointer"
        >
            <td>{{ c.name }}</td>
            <td>{{ c.description }}</td>
            <td>{{ c.parent }}</td>
            <td></td>
        </tr>

        <tr>
            <td colspan="4" class="p-0">
                <div id="expand-{{ c.id }}"></div>
            </td>
        </tr>

        {% empty %}
        <tr><td colspan="4">No hay categorías.</td></tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% endblock %}

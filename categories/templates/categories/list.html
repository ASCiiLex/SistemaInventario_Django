{% extends 'base.html' %}

{% block content %}
<h2>Categorías</h2>

<a href="/categorias/crear/" class="btn btn-success mb-3">Nueva Categoría</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Padre</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for c in categories %}
        <tr>
            <td>{{ c.name }}</td>
            <td>{{ c.description }}</td>
            <td>{{ c.parent }}</td>
            <td>
                <a href="/categorias/editar/{{ c.id }}/" class="btn btn-sm btn-primary">Editar</a>
                <a href="/categorias/eliminar/{{ c.id }}/" class="btn btn-sm btn-danger">Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No hay categorías.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}

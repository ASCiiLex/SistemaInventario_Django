{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Miembros de la organización</h2>

    <!-- 🔥 INVITAR USUARIO (MEJORADO UX) -->
    <div class="card mb-4">
        <div class="card-body">

            <h5 class="card-title mb-3">Invitar usuario</h5>

            <form method="post" action="{% url 'invite_member' %}" class="row g-3">
                {% csrf_token %}

                <div class="col-md-5">
                    <label class="form-label">Email</label>
                    {{ invite_form.email }}
                </div>

                <div class="col-md-3">
                    <label class="form-label">Rol</label>
                    {{ invite_form.role }}
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary w-100">
                        Invitar usuario
                    </button>
                </div>

            </form>

        </div>
    </div>

    <!-- 🔥 TABLA -->
    <div id="members-table">
        {% include "organizations/members/partials/table.html" %}
    </div>

</div>

{% endblock %}

<script>
// ===============================
// 🔥 EVENT BUS GLOBAL (CORE)
// ===============================
window.EventBus = {
    emit(name, detail = {}) {
        document.body.dispatchEvent(new CustomEvent(name, { detail }));
    },
    on(name, callback) {
        document.body.addEventListener(name, callback);
    }
};

// ===============================
// BACKWARD COMPAT
// ===============================
function emitEvent(name, detail = {}) {
    window.EventBus.emit(name, detail);
}

// ===============================
// 🔥 CSRF GLOBAL (HTMX FIX)
// ===============================
document.body.addEventListener('htmx:configRequest', function (event) {
    const token = document.querySelector('[name=csrfmiddlewaretoken]');
    if (token) {
        event.detail.headers['X-CSRFToken'] = token.value;
    }
});

// ===============================
// THEME INIT
// ===============================
(function () {
    const saved = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", saved);
})();

// ===============================
// SELECT2
// ===============================
function initSelect2(ctx) {
    if (!window.jQuery?.fn?.select2) return;

    const $ = window.jQuery;

    $(ctx).find('select.select2').each(function () {
        if ($(this).data('select2')) return;

        const url = $(this).data('ajax--url');

        const baseConfig = {
            width: '100%',
            theme: 'bootstrap-5',
            allowClear: true,
            placeholder: $(this).data('placeholder') || 'Seleccionar...'
        };

        if (url) {
            $(this).select2({
                ...baseConfig,
                minimumInputLength: 1,
                ajax: {
                    url: url,
                    dataType: 'json',
                    delay: 300,
                    cache: true,
                    data: params => ({
                        q: params.term || ''
                    }),
                    processResults: data => ({
                        results: data.results
                    })
                }
            });
        } else {
            $(this).select2(baseConfig);
        }
    });
}

document.addEventListener('DOMContentLoaded', () => initSelect2(document));
document.body.addEventListener('htmx:afterSwap', e => initSelect2(e.target));

// ===============================
// TOASTS
// ===============================
function showToast(message) {
    const container = document.getElementById('toast-container');

    if (!container) return;

    const el = document.createElement('div');
    el.className = "toast align-items-center border-0 mb-2 bg-dark text-white";
    el.innerHTML = `<div class="d-flex">
        <div class="toast-body">${message}</div>
        <button class="btn-close btn-close-white me-2 m-auto"></button>
    </div>`;

    container.appendChild(el);

    setTimeout(() => el.remove(), 3000);
}

// ===============================
// MODAL
// ===============================
document.body.addEventListener('htmx:afterSwap', (e) => {
    if (e.detail.target.id === 'mainModalContent') {
        new bootstrap.Modal(document.getElementById('mainModal')).show();
    }
});

// ===============================
// 🔥 WEBSOCKET → EVENT BUS
// ===============================
function connectWS() {
    const protocol = location.protocol === "https:" ? "wss://" : "ws://";
    const socket = new WebSocket(protocol + location.host + "/ws/notificaciones/");

    socket.onmessage = (e) => {
        const data = JSON.parse(e.data);

        // 🔥 EVENTOS NORMALIZADOS
        if (data.type === "notification") {
            EventBus.emit("inventory:notifications_updated", data);
        }

        if (data.type === "stock_low") {
            EventBus.emit("inventory:stock_updated", data);
        }

        if (data.type === "order") {
            EventBus.emit("inventory:orders_updated", data);
        }

        // fallback genérico
        EventBus.emit(`inventory:${data.type}`, data);

        if (data.message) showToast(data.message);
    };

    socket.onclose = () => setTimeout(connectWS, 2000);
}

connectWS();

// ===============================
// 🔥 HTMX → EVENT BUS
// ===============================
document.body.addEventListener("htmx:afterRequest", (e) => {
    const trigger = e.detail.xhr.getResponseHeader("HX-Trigger");

    if (!trigger) return;

    try {
        const events = JSON.parse(trigger);

        Object.keys(events).forEach(name => {
            EventBus.emit(name, events[name]);

            // 🔥 NORMALIZACIÓN
            if (name.includes("notifications")) {
                EventBus.emit("inventory:notifications_updated");
            }

            if (name.includes("orders")) {
                EventBus.emit("inventory:orders_updated");
            }
        });

    } catch (err) {
        console.warn("HX-Trigger parse error", err);
    }
});

// ===============================
// LOADER
// ===============================
document.body.addEventListener("htmx:beforeRequest", () => {
    const bar = document.getElementById("loader-bar");
    if (bar) bar.style.width = "70%";
});

document.body.addEventListener("htmx:afterSwap", () => {
    const bar = document.getElementById("loader-bar");
    if (!bar) return;

    bar.style.width = "100%";
    setTimeout(() => bar.style.width = "0%", 300);
});
</script>

<script>
// ===============================
// ALPINE: NOTIFICATION SETTINGS
// ===============================
function notifSettings() {
    return {
        sound: true,
        push: true,

        loadSettings() {
            const saved = JSON.parse(localStorage.getItem("notifSettings") || "{}");

            this.sound = saved.sound ?? true;
            this.push = saved.push ?? true;
        },

        save() {
            localStorage.setItem("notifSettings", JSON.stringify({
                sound: this.sound,
                push: this.push
            }));
        },

        toggleSound() {
            this.sound = !this.sound;
            this.save();
        },

        togglePush() {
            this.push = !this.push;
            this.save();
        }
    };
}
</script>

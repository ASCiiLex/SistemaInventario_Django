{% load static %}

<script>
// ===============================
// EVENT BUS GLOBAL (CORE)
// ===============================
window.EventBus = {
    emit(name, detail = {}) {
        document.body.dispatchEvent(new CustomEvent(name, { detail }));
    },
    on(name, callback) {
        document.body.addEventListener(name, callback);
    }
};

function emitEvent(name, detail = {}) {
    window.EventBus.emit(name, detail);
}

// ===============================
// CSRF GLOBAL (HTMX FIX)
// ===============================
document.body.addEventListener('htmx:configRequest', function (event) {
    const token = document.querySelector('[name=csrfmiddlewaretoken]');
    if (token) {
        event.detail.headers['X-CSRFToken'] = token.value;
    }
});

// ===============================
// THEME INIT
// ===============================
(function () {
    const saved = localStorage.getItem("theme") || "light";
    document.documentElement.setAttribute("data-theme", saved);
})();

// ===============================
// CLEAR FILTERS
// ===============================
function clearFilters(el) {
    const form = el.closest('form');
    if (!form) return;

    const url = form.getAttribute("hx-get") || window.location.pathname;
    window.location.href = url;
}

// ===============================
// TOGGLE NOTIFICATIONS GROUP
// ===============================
function toggleNotificationGroup(el) {
    const content = el.nextElementSibling;
    if (!content) return;
    content.classList.toggle("d-none");
}

// ===============================
// SELECT2
// ===============================
function initSelect2(ctx) {
    if (!window.jQuery?.fn?.select2) return;

    const $ = window.jQuery;

    $(ctx).find('select.select2').each(function () {
        if ($(this).data('select2')) return;

        const url = $(this).data('ajax--url');
        const form = this.closest('form');

        const baseConfig = {
            width: '100%',
            theme: 'bootstrap-5',
            allowClear: true,
            placeholder: $(this).data('placeholder') || 'Seleccionar...'
        };

        const config = url ? {
            ...baseConfig,
            minimumInputLength: 1,
            ajax: {
                url: url,
                dataType: 'json',
                delay: 300,
                cache: true,
                data: params => ({
                    q: params.term || ''
                }),
                processResults: data => ({
                    results: data.results
                })
            }
        } : baseConfig;

        $(this).select2(config);

        $(this).on('select2:select select2:unselect', function () {
            if (!form) return;
            form.dispatchEvent(new Event('change', { bubbles: true }));
        });
    });
}

function syncSelect2(ctx) {
    if (!window.jQuery?.fn?.select2) return;

    const $ = window.jQuery;

    $(ctx).find('select.select2').each(function () {
        const value = $(this).val();
        if (value) {
            $(this).trigger('change.select2');
        }
    });
}

// ===============================
// INIT GLOBAL
// ===============================
document.addEventListener('DOMContentLoaded', () => {
    initSelect2(document);
    syncSelect2(document);
    initNotificationsPanel();
});

document.body.addEventListener('htmx:afterSwap', e => {
    initSelect2(e.target);
    syncSelect2(e.target);
});

// ===============================
// NOTIFICATIONS PANEL LAZY LOAD
// ===============================
function initNotificationsPanel() {
    const panel = document.getElementById("notificationsPanelOffcanvas");
    const body = document.getElementById("notificationsPanelBody");

    if (!panel || !body) return;

    if (panel.dataset.bound === "true") return;
    panel.dataset.bound = "true";

    panel.addEventListener("show.bs.offcanvas", () => {
        if (!body.dataset.loaded) {
            body.dataset.loaded = "true";
            htmx.trigger(body, "load");
        }
    });
}

// ===============================
// TOASTS
// ===============================
function showToast(message) {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const el = document.createElement('div');
    el.className = "toast align-items-center border-0 mb-2 bg-dark text-white";
    el.innerHTML = `<div class="d-flex">
        <div class="toast-body">${message}</div>
        <button class="btn-close btn-close-white me-2 m-auto"></button>
    </div>`;

    container.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

// ===============================
// HTMX → EVENT BUS
// ===============================
document.body.addEventListener("htmx:afterRequest", (e) => {
    const trigger = e.detail.xhr.getResponseHeader("HX-Trigger");

    if (!trigger) return;

    try {
        const events = JSON.parse(trigger);

        Object.keys(events).forEach(name => {
            EventBus.emit(name, events[name]);
            htmx.trigger(document.body, name);
        });

    } catch (err) {
        console.warn("HX-Trigger parse error", err);
    }
});

// ===============================
// LOADER
// ===============================
document.body.addEventListener("htmx:beforeRequest", () => {
    const bar = document.getElementById("loader-bar");
    if (bar) bar.style.width = "70%";
});

document.body.addEventListener("htmx:afterSwap", () => {
    const bar = document.getElementById("loader-bar");
    if (!bar) return;

    bar.style.width = "100%";
    setTimeout(() => bar.style.width = "0%", 300);
});

// ===============================
// FORM LOCK
// ===============================
function handleSubmit(form) {
    if (form.dataset.submitted === "true") return false;

    form.dataset.submitted = "true";

    const btn = form.querySelector("button[type=submit]");
    if (btn) {
        btn.disabled = true;
        const original = btn.innerHTML;
        btn.dataset.originalText = original;
        btn.innerHTML = btn.dataset.loadingText || "Procesando...";
    }

    return true;
}
</script>

<script src="{% static 'js/form_validation.js' %}"></script>

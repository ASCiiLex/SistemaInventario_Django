<th
    hx-get="{{ url|default:request.path }}?sort={{ field }}&dir={% if current_sort == field and current_dir == 'asc' %}desc{% else %}asc{% endif %}"
    hx-target="{{ target|default:'#table' }}"
    hx-swap="innerHTML"
    hx-push-url="true"
    style="cursor:pointer;"
>
    {{ label }}

    {% if current_sort == field %}
        {% if current_dir == "asc" %} ▲ {% else %} ▼ {% endif %}
    {% endif %}
</th>

<div class="offcanvas offcanvas-end" tabindex="-1" id="notificationsPanelOffcanvas">
    <div class="offcanvas-header">
        <h5>Notificaciones</h5>
        <button class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>

    <div id="notificationsPanelBody"
         class="offcanvas-body"
         hx-get="{% url 'notifications:notifications_panel' %}"
         hx-trigger="inventory:notifications_updated from:body"
         hx-target="this"
         hx-swap="innerHTML">
    </div>
</div>

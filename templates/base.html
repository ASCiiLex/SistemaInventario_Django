<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Inventario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/dashboard/">Inventario</a>

        <div class="d-flex align-items-center">

            <a href="/categorias/" class="btn btn-outline-light me-2">Categorías</a>
            <a href="/proveedores/" class="btn btn-outline-light me-2">Proveedores</a>
            <a href="/productos/" class="btn btn-outline-light me-2">Productos</a>
            <a href="/movimientos/" class="btn btn-outline-light me-3">Movimientos</a>

            <div id="notifications-bell"
                 hx-get="{% url 'notifications_counter' %}"
                 hx-trigger="load, every 5s, movement-created from:body, notifications-updated from:body"
                 hx-target="this"
                 hx-swap="outerHTML">
                {% include 'notifications/partials/bell.html' with unread=notifications_unread %}
            </div>

        </div>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<!-- Modal global -->
<div class="modal fade" id="mainModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content" id="mainModalContent">
    </div>
  </div>
</div>

<!-- Contenedor de toasts -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
    <div id="toast-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.body.addEventListener('htmx:afterSwap', function (event) {
    if (event.detail.target.id === 'mainModalContent') {
        const modalEl = document.getElementById('mainModal');
        const modal = new bootstrap.Modal(modalEl);
        modal.show();
    }
});

document.getElementById('mainModal').addEventListener('hidden.bs.modal', function () {
    document.getElementById('mainModalContent').innerHTML = '';
});

document.body.addEventListener('movement-created', function (event) {
    const modalEl = document.getElementById('mainModal');
    const instance = bootstrap.Modal.getInstance(modalEl);
    if (instance) {
        instance.hide();
    }
    showToast(event.detail && event.detail.message ? event.detail.message : 'Movimiento creado correctamente');
});

document.body.addEventListener('notifications-updated', function (event) {
    showToast(event.detail && event.detail.message ? event.detail.message : 'Notificaciones actualizadas');
});

function showToast(message) {
    const container = document.getElementById('toast-container');
    const wrapper = document.createElement('div');
    wrapper.innerHTML = `
        <div class="toast align-items-center text-bg-dark border-0 mb-2" role="alert" aria-live="assertive" aria-atomic="true">
          <div class="d-flex">
            <div class="toast-body">
              ${message}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Cerrar"></button>
          </div>
        </div>
    `;
    const toastEl = wrapper.firstElementChild;
    container.appendChild(toastEl);
    const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
    toast.show();
    toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Inventario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/dashboard/">Inventario</a>

        <div class="d-flex align-items-center">

            <a href="/categorias/" class="btn btn-outline-light me-2">Categorías</a>
            <a href="/proveedores/" class="btn btn-outline-light me-2">Proveedores</a>
            <a href="/productos/" class="btn btn-outline-light me-2">Productos</a>
            <a href="/movimientos/" class="btn btn-outline-light me-3">Movimientos</a>

            <div id="notifications-bell"
                 hx-get="{% url 'notifications_counter' %}"
                 hx-trigger="load, every 5s, movement-created from:body"
                 hx-target="this"
                 hx-swap="outerHTML">
                {% include 'notifications/partials/bell.html' with unread=notifications_unread %}
            </div>

        </div>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<div class="modal fade" id="mainModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content" id="mainModalContent">
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.body.addEventListener('htmx:afterSwap', function (event) {
    if (event.detail.target.id === 'mainModalContent') {
        const modalEl = document.getElementById('mainModal');
        const modal = new bootstrap.Modal(modalEl);
        modal.show();
    }
});

document.getElementById('mainModal').addEventListener('hidden.bs.modal', function () {
    document.getElementById('mainModalContent').innerHTML = '';
});

document.body.addEventListener('movement-created', function () {
    const modalEl = document.getElementById('mainModal');
    const instance = bootstrap.Modal.getInstance(modalEl);
    if (instance) {
        instance.hide();
    }
});
</script>

</body>
</html>

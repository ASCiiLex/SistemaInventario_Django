{% extends 'base.html' %}

{% block content %}
<h2 class="mb-3">Movimientos de Stock</h2>

<form method="GET"
      class="mb-3 row g-2"
      hx-get="{% url 'movement_list' %}"
      hx-target="#movements-table"
      hx-push-url="true">

    <div class="col-md-3">
        <input type="text" name="q" value="{{ search }}" class="form-control" placeholder="Buscar producto...">
    </div>

    <div class="col-md-2">
        <select name="type" class="form-control">
            <option value="">Todos</option>
            <option value="IN" {% if movement_type == "IN" %}selected{% endif %}>Entradas</option>
            <option value="OUT" {% if movement_type == "OUT" %}selected{% endif %}>Salidas</option>
        </select>
    </div>

    <div class="col-md-3">
        <select name="product" class="form-control">
            <option value="">Todos los productos</option>
            {% for p in products %}
                <option value="{{ p.id }}" {% if product_id|default:'' == p.id|stringformat:'s' %}selected{% endif %}>
                    {{ p.name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-2">
        <input type="date" name="from" value="{{ date_from }}" class="form-control">
    </div>

    <div class="col-md-2">
        <input type="date" name="to" value="{{ date_to }}" class="form-control">
    </div>

    <div class="col-md-12 mt-2 d-flex justify-content-end" style="gap: 10px;">
        <button class="btn btn-primary">Filtrar</button>
    </div>
</form>

<button class="btn btn-success mb-3"
        hx-get="{% url 'movement_create' %}"
        hx-target="#mainModalContent"
        hx-trigger="click">
    Nuevo Movimiento
</button>

<a href="{% url 'export_movements_csv' %}" class="btn btn-outline-secondary mb-3">Exportar CSV</a>

<div id="movements-table">
    {% include 'movements/partials/movements_table.html' %}
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<h2>Movimientos de Stock</h2>

<a href="/movimientos/crear/" class="btn btn-success mb-3">Nuevo Movimiento</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Producto</th>
            <th>Tipo</th>
            <th>Cantidad</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody>
        {% for m in movements %}
        <tr>
            <td>{{ m.product }}</td>
            <td>{{ m.get_movement_type_display }}</td>
            <td>{{ m.quantity }}</td>
            <td>{{ m.created_at }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No hay movimientos.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}

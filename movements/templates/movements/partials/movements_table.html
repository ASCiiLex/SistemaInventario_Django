<table class="table table-striped">
    <thead>
        <tr>
            <th>Producto</th>
            <th>Tipo</th>
            <th>Cantidad</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody>
        {% for m in movements %}
        <tr>
            <td>{{ m.product }}</td>
            <td>
                {% if m.movement_type == "IN" %}
                    <span class="text-success fw-bold">Entrada</span>
                {% else %}
                    <span class="text-danger fw-bold">Salida</span>
                {% endif %}
            </td>
            <td>{{ m.quantity }}</td>
            <td>{{ m.created_at|date:"d/m/Y H:i" }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No hay movimientos.</td></tr>
        {% endfor %}
    </tbody>
</table>

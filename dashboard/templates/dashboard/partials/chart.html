<div style="height: 200px; position: relative;">

    <!-- Selector -->
    <div class="d-flex justify-content-end mb-2">
        <select id="chartSelector" class="form-select form-select-sm chart-selector">
            <option value="categorias">Stock por categoría</option>
            <option value="proveedores">Stock por proveedor</option>
            <option value="almacenes">Stock por almacén</option>
            <option value="rotacion">Rotación por producto</option>
            <option value="movimientos">Movimientos por tipo</option>
        </select>
    </div>

    <!-- Loader -->
    <div id="chart-loader"
         style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.6); z-index:10; display:none;">
        <div class="spinner-border text-primary"></div>
    </div>

    <!-- Canvas -->
    <canvas id="categoryChart"></canvas>

</div>

<script>
(function () {
    window.chartData = {
        labels: {{ chart_labels|safe }},
        values: {{ chart_values|safe }}
    };

    // 🔥 Forzar init cuando HTMX inyecta este bloque
    if (window.initView) {
        window.initView();
    }
})();
</script>

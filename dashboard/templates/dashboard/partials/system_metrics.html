<div class="row g-3">

    <div class="col-md-3">
        <div class="card text-bg-dark">
            <div class="card-body text-center">
                <h6>Requests</h6>
                <p class="fs-4">{{ requests }}</p>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-bg-danger">
            <div class="card-body text-center">
                <h6>Errores</h6>
                <p class="fs-4">{{ errors }}</p>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-bg-info">
            <div class="card-body text-center">
                <h6>Eventos</h6>
                <p class="fs-4">{{ events }}</p>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card text-bg-warning">
            <div class="card-body text-center">
                <h6>P95 Latencia</h6>
                <p class="fs-4">{{ p95_latency }}s</p>
            </div>
        </div>
    </div>

</div>

<div class="row mt-3">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <h6>Endpoints más lentos</h6>
                <table class="table table-sm">
                    <thead>
                        <tr>
                            <th>Endpoint</th>
                            <th>Latencia media</th>
                            <th>Hits</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for ep in top_endpoints %}
                        <tr>
                            <td>{{ ep.endpoint }}</td>
                            <td>{{ ep.avg_latency }}s</td>
                            <td>{{ ep.hits }}</td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="3">Sin datos</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

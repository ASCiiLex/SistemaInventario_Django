{% if notifications %}
<table class="table table-striped">
    <thead>
        <tr>
            <th>Mensaje</th>
            <th>Producto</th>
            <th>Tipo</th>
            <th>Leída</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody>
        {% for n in notifications %}
        <tr>
            <td>{{ n.message }}</td>
            <td>{{ n.product }}</td>
            <td>{{ n.type }}</td>
            <td>{{ n.read }}</td>
            <td>{{ n.created_at }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>No hay notificaciones recientes.</p>
{% endif %}

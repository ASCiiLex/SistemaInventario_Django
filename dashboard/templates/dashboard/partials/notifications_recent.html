<table class="table table-striped">
    <thead class="table-primary">
        <tr>
            <th>Mensaje</th>
            <th>Producto</th>
            <th>Tipo</th>
            <th>Leída</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody>
        {% for n in notifications %}
        <tr>
            <td>{{ n.message }}</td>
            <td>{{ n.product }}</td>
            <td>{{ n.get_type_display }}</td>
            <td>{{ n.seen|yesno:"Sí,No" }}</td>
            <td>{{ n.created_at|date:"d/m/Y H:i" }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5" class="text-center">No hay notificaciones recientes.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

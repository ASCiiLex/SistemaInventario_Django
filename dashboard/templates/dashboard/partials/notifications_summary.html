<div class="row text-center">
    <div class="col">
        <h5>Total</h5>
        <p class="fs-4">{{ notifications_total }}</p>
    </div>
    <div class="col">
        <h5>No leídas</h5>
        <p class="fs-4">{{ notifications_unread }}</p>
    </div>
    <div class="col">
        <h5>Por tipo</h5>
        <p class="fs-6">
            {% if notifications_by_type %}
                {% for t in notifications_by_type %}
                    {{ t.type }} ({{ t.total }}){% if not forloop.last %}, {% endif %}
                {% endfor %}
            {% else %}
                Sin datos
            {% endif %}
        </p>
    </div>
</div>

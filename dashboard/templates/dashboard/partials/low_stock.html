{% if low_stock %}
<table class="table table-striped">
    <thead>
        <tr>
            <th>Producto</th>
            <th>Stock</th>
            <th>Mínimo</th>
        </tr>
    </thead>
    <tbody>
        {% for item in low_stock %}
        <tr>
            <td>{{ item.product.name }}</td>
            <td>{{ item.quantity }}</td>
            <td>{{ item.product.minimum_stock }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>No hay productos bajo mínimo.</p>
{% endif %}

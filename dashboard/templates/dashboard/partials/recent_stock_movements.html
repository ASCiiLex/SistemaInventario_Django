{% if stock_movements %}
<table class="table table-striped">
    <thead>
        <tr>
            <th>Producto</th>
            <th>Tipo</th>
            <th>Cantidad</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody>
        {% for m in stock_movements %}
        <tr>
            <td>{{ m.product }}</td>
            <td>{{ m.type }}</td>
            <td>{{ m.quantity }}</td>
            <td>{{ m.created_at }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>No hay movimientos recientes.</p>
{% endif %}

<table class="table table-striped">
    <thead>
        <tr>
            <th>Producto</th>
            <th>Tipo</th>
            <th>Cantidad</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody>
        {% if stock_movements %}
            {% for m in stock_movements %}
            <tr>
                <td>{{ m.product }}</td>
                <td>{{ m.get_movement_type_display }}</td>
                <td>{{ m.quantity }}</td>
                <td>{{ m.created_at }}</td>
            </tr>
            {% endfor %}
        {% else %}
            <tr>
                <td colspan="4" class="text-center">No hay movimientos recientes.</td>
            </tr>
        {% endif %}
    </tbody>
</table>

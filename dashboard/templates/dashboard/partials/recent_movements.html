<table class="table table-striped">
    <thead>
        <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Cantidad</th>
            <th>Producto</th>
            <th>Origen</th>
            <th>Destino</th>
        </tr>
    </thead>
    <tbody>
        {% if movements %}
            {% for m in movements %}
            <tr>
                <td>{{ m.created_at }}</td>
                <td>{{ m.get_movement_type_display }}</td>
                <td>{{ m.quantity }}</td>
                <td>{{ m.product }}</td>
                <td>{{ m.origin }}</td>
                <td>{{ m.destination }}</td>
            </tr>
            {% endfor %}
        {% else %}
            <tr>
                <td colspan="6" class="text-center">No hay actividad reciente.</td>
            </tr>
        {% endif %}
    </tbody>
</table>

{% if movements %}
<table class="table table-striped">
    <thead>
        <tr>
            <th>Producto</th>
            <th>Tipo</th>
            <th>Cantidad</th>
            <th>Origen</th>
            <th>Destino</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody>
        {% for m in movements %}
        <tr>
            <td>{{ m.product }}</td>
            <td>{{ m.type }}</td>
            <td>{{ m.quantity }}</td>
            <td>{{ m.origin }}</td>
            <td>{{ m.destination }}</td>
            <td>{{ m.created_at }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>No hay actividad reciente.</p>
{% endif %}

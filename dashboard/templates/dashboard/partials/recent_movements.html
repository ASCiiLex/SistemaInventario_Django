<h3>Movimientos Recientes</h3>

<table class="table table-striped mb-4">
    <thead>
        <tr>
            <th>Producto</th>
            <th>Tipo</th>
            <th>Cantidad</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody>
        {% for m in recent_movements %}
        <tr>
            <td>{{ m.product }}</td>
            <td>{{ m.get_movement_type_display }}</td>
            <td>{{ m.quantity }}</td>
            <td>{{ m.created_at|date:"d/m/Y H:i" }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No hay movimientos recientes.</td></tr>
        {% endfor %}
    </tbody>
</table>

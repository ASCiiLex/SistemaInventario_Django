{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Dashboard del Inventario</h2>

<!-- 1. Resumen de notificaciones -->
<div id="dashboard-notifications-summary"
     hx-get="{% url 'dashboard_notifications_summary' %}"
     hx-trigger="load, every 20s"
     hx-target="this"
     hx-swap="outerHTML">
</div>

<!-- 2. Cajas Totales -->
<div id="dashboard-totals"
     hx-get="{% url 'dashboard_totals' %}"
     hx-trigger="load, every 10s"
     hx-target="this"
     hx-swap="outerHTML">
</div>

<!-- 3. Últimas notificaciones -->
<div id="dashboard-notifications-recent"
     hx-get="{% url 'dashboard_notifications_recent' %}"
     hx-trigger="load, every 30s"
     hx-target="this"
     hx-swap="outerHTML">
</div>

<hr>

<!-- 4. Productos bajo mínimo -->
<div id="dashboard-low-stock"
     hx-get="{% url 'dashboard_low_stock' %}"
     hx-trigger="load, every 10s"
     hx-target="this"
     hx-swap="outerHTML">
</div>

<hr>

<!-- 5. Histórico de movimientos -->
<div id="dashboard-recent-movements"
     hx-get="{% url 'dashboard_recent_movements' %}"
     hx-trigger="load, every 10s"
     hx-target="this"
     hx-swap="outerHTML">
</div>

<hr>

<!-- 6. Actividad reciente del inventario -->
<div id="dashboard-recent-stock-movements"
     hx-get="{% url 'dashboard_recent_stock_movements' %}"
     hx-trigger="load, every 10s"
     hx-target="this"
     hx-swap="outerHTML">
</div>

<hr>

<!-- 7. Stock por categoría -->
<div id="dashboard-chart"
     hx-get="{% url 'dashboard_chart' %}"
     hx-trigger="load, every 10s"
     hx-target="this"
     hx-swap="outerHTML">
</div>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
{% endblock %}

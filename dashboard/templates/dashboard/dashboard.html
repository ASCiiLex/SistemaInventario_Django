{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">Dashboard del Inventario</h2>

<!-- BLOQUE: Totales -->
<div id="dashboard-totals"
     hx-get="{% url 'dashboard_totals' %}"
     hx-trigger="load, every 10s"
     hx-target="this"
     hx-swap="outerHTML">
</div>

<hr>

<!-- BLOQUE: Productos bajo mínimo -->
<div id="dashboard-low-stock"
     hx-get="{% url 'dashboard_low_stock' %}"
     hx-trigger="load, every 10s"
     hx-target="this"
     hx-swap="outerHTML">
</div>

<hr>

<!-- BLOQUE: Movimientos legacy -->
<div id="dashboard-recent-movements"
     hx-get="{% url 'dashboard_recent_movements' %}"
     hx-trigger="load, every 10s"
     hx-target="this"
     hx-swap="outerHTML">
</div>

<hr>

<!-- BLOQUE: Movimientos modernos -->
<div id="dashboard-recent-stock-movements"
     hx-get="{% url 'dashboard_recent_stock_movements' %}"
     hx-trigger="load, every 10s"
     hx-target="this"
     hx-swap="outerHTML">
</div>

<hr>

<!-- BLOQUE: Gráfico -->
<div id="dashboard-chart"
     hx-get="{% url 'dashboard_chart' %}"
     hx-trigger="load, every 10s"
     hx-target="this"
     hx-swap="outerHTML">
</div>

{% endblock %}

<div class="row mt-3">

    <!-- 🔥 MÉTRICAS DEL SISTEMA (movido aquí) -->
    <div class="col-12">
        <div class="card card-section" data-section="system-metrics">
            <div class="card-header section-header bg-dark text-white">
                <span>Métricas del Sistema</span>
                <span class="toggle-arrow arrow-up"></span>
            </div>

            <div class="card-body section-content"
                hx-get="{% url 'dashboard_system_metrics' %}"
                hx-trigger="load, inventory:stock_changed from:body"
                hx-target="this"
                hx-swap="innerHTML">
            </div>
        </div>
    </div>

    <!-- 🔥 ACCESO A OBSERVABILIDAD PRO -->
    <div class="col-12 mt-3">
        <div class="card card-section" data-section="observability">

            <div class="card-header section-header bg-secondary text-white">
                <span>Observabilidad Avanzada</span>
                <span class="toggle-arrow arrow-up"></span>
            </div>

            <div class="card-body section-content text-center">

                <p class="mb-3 text-muted">
                    Análisis detallado de rendimiento, trazas y cuellos de botella
                </p>

                <a href="{% url 'slow_requests' %}" class="btn btn-outline-dark">
                    🔎 Abrir herramienta de observabilidad
                </a>

            </div>

        </div>
    </div>

</div>

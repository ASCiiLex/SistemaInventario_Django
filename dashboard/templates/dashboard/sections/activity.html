<div class="row g-3 mt-1">
    <div class="col-12">
        <div class="card card-section" data-section="activity">
            <div class="card-header section-header bg-dark text-white">
                <span>Registro de Actividad</span>
                <span class="toggle-arrow arrow-up"></span>
            </div>

            <div id="activity-container" class="card-body section-content">

                <div class="subsection" id="actividad-reciente">
                    <div class="subsection-header">
                        <span>Actividad Reciente</span>
                        <span class="sub-toggle-arrow sub-arrow-up"></span>
                    </div>

                    <div class="subsection-content compact-table"
                         hx-get="{% url 'dashboard_recent_movements' %}"
                         hx-trigger="load once, inventory:refresh from:body"
                         hx-target="this"
                         hx-swap="innerHTML">
                    </div>
                </div>

                <div class="subsection mt-2" id="historico-movimientos">
                    <div class="subsection-header">
                        <span>Histórico de Movimientos</span>
                        <span class="sub-toggle-arrow sub-arrow-down"></span>
                    </div>

                    <div class="subsection-content compact-table"
                         hx-get="{% url 'dashboard_recent_stock_movements' %}"
                         hx-trigger="load once, inventory:refresh from:body"
                         hx-target="this"
                         hx-swap="innerHTML">
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<div class="row g-3 mt-1">

    <div class="col-md-6">
        <div class="card card-section" data-section="kpis">
            <div class="card-header section-header bg-secondary text-white">
                <span>Indicadores Clave</span>
                <span class="toggle-arrow arrow-up"></span>
            </div>

            <div id="kpis-container"
                 class="card-body section-content"
                 hx-get="{% url 'dashboard_totals' %}"
                 hx-trigger="load, inventory:stock_changed from:body, notifications:updated from:body, orders:updated from:body"
                 hx-target="this"
                 hx-swap="innerHTML">
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card card-section" data-section="chart">
            <div class="card-header section-header bg-warning text-dark">
                <span>Gráfico de Stock</span>
                <span class="toggle-arrow arrow-up"></span>
            </div>

            <div class="card-body section-content"
                 hx-get="{% url 'dashboard_chart' %}"
                 hx-trigger="load, inventory:stock_changed from:body"
                 hx-target="this"
                 hx-swap="innerHTML">
            </div>

        </div>
    </div>

    <div class="col-12 mt-2">
        <div class="card card-section" data-section="system-metrics">
            <div class="card-header section-header bg-dark text-white">
                <span>Métricas del Sistema</span>
                <span class="toggle-arrow arrow-up"></span>
            </div>

            <div class="card-body section-content"
                hx-get="{% url 'dashboard_system_metrics' %}"
                hx-trigger="load, inventory:stock_changed from:body"
                hx-target="this"
                hx-swap="innerHTML">
            </div>
            
        </div>
    </div>

</div>

{% extends 'base.html' %}

{% block content %}
<h2 class="mb-3">Notificaciones</h2>

<form
    method="GET"
    class="row g-2 mb-3"
    hx-get="{% url 'notifications_list' %}"
    hx-target="#notifications-table"
    hx-swap="outerHTML"
    hx-push-url="true">

    <!-- STATUS -->
    <div class="col-md-2">
        <select name="status" class="form-control">
            <option value="">Todas</option>
            <option value="new" {% if status == "new" %}selected{% endif %}>Solo nuevas</option>
            <option value="read" {% if status == "read" %}selected{% endif %}>Solo leídas</option>
        </select>
    </div>

    <!-- PRODUCT -->
    <div class="col-md-3">
        <select name="product" class="form-control">
            <option value="">Todos los productos</option>
            {% for pid, pname in products %}
                <option value="{{ pid }}" {% if product_id|default:'' == pid|stringformat:'s' %}selected{% endif %}>
                    {{ pname }}
                </option>
            {% endfor %}
        </select>
    </div>

    <!-- 🔥 TYPE (NUEVO) -->
    <div class="col-md-2">
        <select name="type" class="form-control">
            <option value="">Todos tipos</option>
            <option value="stock_item_low" {% if type == "stock_item_low" %}selected{% endif %}>Incidencia</option>
            <option value="product_risk" {% if type == "product_risk" %}selected{% endif %}>Riesgo</option>
            <option value="movement" {% if type == "movement" %}selected{% endif %}>Movimiento</option>
            <option value="order" {% if type == "order" %}selected{% endif %}>Pedido</option>
            <option value="alert" {% if type == "alert" %}selected{% endif %}>Alerta</option>
            <option value="info" {% if type == "info" %}selected{% endif %}>Info</option>
        </select>
    </div>

    <!-- 🔥 PRIORITY (FIXED) -->
    <div class="col-md-2">
        <select name="priority" class="form-control">
            <option value="">Todas prioridades</option>
            <option value="critical" {% if priority == "critical" %}selected{% endif %}>Crítica</option>
            <option value="warning" {% if priority == "warning" %}selected{% endif %}>Warning</option>
            <option value="info" {% if priority == "info" %}selected{% endif %}>Info</option>
        </select>
    </div>

    <!-- ACTIONS -->
    <div class="col-md-1 d-grid">
        <button class="btn btn-primary">OK</button>
    </div>

    <!-- 🔥 RESET REAL -->
    <div class="col-md-2 d-grid">
        <button
            type="button"
            class="btn btn-outline-secondary"
            hx-get="{% url 'notifications_list' %}"
            hx-target="#notifications-table"
            hx-swap="outerHTML"
            hx-push-url="true">
            Limpiar
        </button>
    </div>

</form>

<div id="notifications-table">
    {% include 'notifications/partials/notifications_table.html' %}
</div>

{% endblock %}

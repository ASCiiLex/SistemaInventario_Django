{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Productos</h2>

    <div class="d-flex gap-2">
        {% if can_create_products %}
            <a href="{% url 'product_create' %}" class="btn btn-success">Nuevo Producto</a>
        {% endif %}
        {% if can_export_products %}
            <a href="{% url 'export_products_csv' %}" class="btn btn-outline-secondary">Exportar CSV</a>
        {% endif %}
    </div>
</div>

<form method="GET"
      class="mb-3 row g-2"
      hx-get="{% url 'product_list' %}"
      hx-target="#products-table"
      hx-swap="innerHTML"
      hx-push-url="true"
      hx-trigger="change delay:300ms, keyup changed delay:500ms from:input[name='q']">

    <div class="col-md-3">
        <input type="text"
               name="q"
               value="{{ search }}"
               class="form-control"
               placeholder="Buscar producto...">
    </div>

    <div class="col-md-3">
        <select name="category"
                class="form-control select2"
                data-ajax--url="{% url 'ajax_categories' %}"
                data-placeholder="Categoría">
            {% if category_id %}
                <option value="{{ category_id }}" selected>
                    {{ category_name }}
                </option>
            {% endif %}
        </select>
    </div>

    <div class="col-md-3">
        <select name="supplier"
                class="form-control select2"
                data-ajax--url="{% url 'ajax_suppliers' %}"
                data-placeholder="Proveedor">
            {% if supplier_id %}
                <option value="{{ supplier_id }}" selected>
                    {{ supplier_name }}
                </option>
            {% endif %}
        </select>
    </div>

    <div class="col-md-2">
        <select name="stock" class="form-control">
            <option value="">Stock: todos</option>
            <option value="low" {% if stock_filter == "low" %}selected{% endif %}>
                Solo bajo mínimo
            </option>
        </select>
    </div>

    <div class="col-md-1 d-grid">
        <button type="button"
                class="btn btn-outline-secondary"
                onclick="clearFilters(this)">
            Limpiar
        </button>
    </div>

</form>

<div id="products-table">
    {% include 'products/partials/products_table.html' %}
</div>

{% endblock %}

{% extends 'base.html' %}

{% block content %}
<h2 class="mb-3">Productos</h2>

<form method="GET"
      class="mb-3 row g-2"
      hx-get="{% url 'product_list' %}"
      hx-target="#products-table"
      hx-swap="innerHTML"
      hx-push-url="true">

    <div class="col-md-3">
        <input type="text" name="q" value="{{ search }}" class="form-control" placeholder="Buscar producto...">
    </div>

    <div class="col-md-3">
        <select name="category" class="form-control select2">
            <option value="">Todas las categorías</option>
            {% for c in categories %}
                <option value="{{ c.id }}" {% if category_id|default:'' == c.id|stringformat:'s' %}selected{% endif %}>
                    {{ c.name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-3">
        <select name="supplier" class="form-control select2">
            <option value="">Todos los proveedores</option>
            {% for s in suppliers %}
                <option value="{{ s.id }}" {% if supplier_id|default:'' == s.id|stringformat:'s' %}selected{% endif %}>
                    {{ s.name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <div class="col-md-2">
        <select name="stock" class="form-control">
            <option value="">Stock: todos</option>
            <option value="low" {% if stock_filter == "low" %}selected{% endif %}>Solo bajo mínimo</option>
        </select>
    </div>

    <div class="col-md-1 d-grid">
        <button class="btn btn-primary">Filtrar</button>
    </div>
</form>

<a href="{% url 'product_create' %}" class="btn btn-success mb-3">Nuevo Producto</a>
<a href="{% url 'export_products_csv' %}" class="btn btn-outline-secondary mb-3">Exportar CSV</a>

<div id="products-table">
    {% include 'products/partials/products_table.html' %}
</div>
{% endblock %}

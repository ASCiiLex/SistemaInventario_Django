<div class="p-3 bg-surface border-top">
    <strong class="d-block mb-2">Distribución por almacén</strong>

    <div class="table-responsive">
        <table class="table table-sm table-striped mb-0">
            <thead>
                <tr>
                    <th>Almacén</th>
                    <th>Stock</th>
                    <th>Mínimo</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                {% for item in items %}
                <tr>
                    <td>{{ item.location.name }}</td>
                    <td>{{ item.quantity }}</td>
                    <td>{{ item.min_stock }}</td>
                    <td>
                        {% if item.is_below_minimum %}
                            🔴 Bajo mínimo
                        {% else %}
                            🟢 OK
                        {% endif %}
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="4" class="text-center text-muted">Sin stock</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

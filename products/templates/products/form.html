{% extends 'base.html' %}

{% block content %}
<h2>{{ title }}</h2>

<form method="POST" enctype="multipart/form-data" class="mt-3">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="btn btn-success">Guardar</button>
    <a href="{% url 'product_list' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
